name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        # Notebook execution is a manual step (see README) and is not run in CI.
        # Tests that require real Tanager HDF5 scenes or optional deps (e.g. mesma)
        # self-skip via conftest.py / pytest.mark.skipif when those are unavailable,
        # so this passes with no bulk data assets and no optional deps installed.
        run: pytest tests/
